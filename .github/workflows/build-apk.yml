name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PWABuilder
        run: npm install -g pwabuilder

      - name: Wait for GitHub Pages
        run: sleep 30

      - name: Build APK
        run: |
          pwabuilder package https://soblin-app.github.io/scanalarm2 -p android -o ./output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanAlarm-APK
          path: ./output/*.apk
